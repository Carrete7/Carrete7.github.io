<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2230094544889798" crossorigin="anonymous"></script>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Aire Comprimido | IndustrialCalc Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --primary: #334155; --border: #e2e8f0; --header-bg: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; align-items: center; }
        header { background-color: var(--header-bg); padding: 1rem 2rem; color: white; width: 100%; box-sizing: border-box; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        main { width: 100%; max-width: 800px; padding: 2rem 1rem; box-sizing: border-box; }
        .card { background: var(--surface); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        h1 { color: var(--primary); text-align: center; }
        input, select { width: 100%; padding: 0.8rem; margin: 10px 0; border: 1px solid var(--border); border-radius: 6px; }
        button { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }
        .result { margin-top: 1.5rem; padding: 1.5rem; background: #f1f5f9; border-radius: 8px; display: none; text-align: center; border: 2px solid #cbd5e1; }
    </style>
</head>
<body>
    <header><div class="header-content"><a href="index.html" style="color:white; text-decoration:none; font-weight:800;">IndustrialCalc Pro</a></div></header>
    <main>
        <div class="card">
            <h1><i class="fas fa-wind"></i> Redes de Aire Comprimido</h1>
            <label>Caudal (l/min)</label><input type="number" id="aire_q" placeholder="Ej: 2000">
            <label>Presión de trabajo (bar)</label><input type="number" id="aire_p" placeholder="Ej: 7">
            <label>Longitud de tubería (m)</label><input type="number" id="aire_l" placeholder="Ej: 50">
            <button onclick="calcAire()">Calcular Diámetro Recomendado</button>
            <div id="res_aire" class="result"></div>
        </div>
    </main>
    <script>
        function calcAire() {
            const Q = parseFloat(document.getElementById('aire_q').value);
            const P = parseFloat(document.getElementById('aire_p').value);
            const L = parseFloat(document.getElementById('aire_l').value);
            if(Q>0 && P>0 && L>0) {
                // Fórmula simplificada para d (mm) con caída de 0.1 bar
                const d = Math.pow((1.6e8 * Math.pow(Q/60, 1.85) * L) / (0.1 * P * 1e5), 1/5);
                document.getElementById('res_aire').style.display = 'block';
                document.getElementById('res_aire').innerHTML = `<strong>Diámetro interior mínimo:</strong><br><span style="font-size:2rem;">${d.toFixed(1)} mm</span>`;
            }
        }
    </script>
</body>
</html>
