<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2230094544889798" crossorigin="anonymous"></script>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Rocío | IndustrialCalc Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --primary: #f59e0b; --border: #e2e8f0; --header-bg: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; align-items: center; }
        header { background-color: var(--header-bg); padding: 1rem 2rem; color: white; width: 100%; box-sizing: border-box; }
        main { width: 100%; max-width: 800px; padding: 2rem 1rem; box-sizing: border-box; }
        .card { background: var(--surface); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        h1 { color: var(--primary); text-align: center; }
        input { width: 100%; padding: 0.8rem; margin: 10px 0; border: 1px solid var(--border); border-radius: 6px; }
        button { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }
        .result { margin-top: 1.5rem; padding: 1.5rem; background: #fffbeb; border-radius: 8px; display: none; text-align: center; border: 2px solid #fef3c7; }
    </style>
</head>
<body>
    <header><div class="header-content"><a href="index.html" style="color:white; text-decoration:none; font-weight:800;">IndustrialCalc Pro</a></div></header>
    <main>
        <div class="card">
            <h1><i class="fas fa-droplet"></i> Punto de Rocío (Dew Point)</h1>
            <label>Temperatura Ambiente (°C)</label><input type="number" id="temp" placeholder="Ej: 25">
            <label>Humedad Relativa (%)</label><input type="number" id="hum" placeholder="Ej: 60">
            <button onclick="calcRocio()">Calcular Punto de Rocío</button>
            <div id="res_rocio" class="result"></div>
        </div>
    </main>
    <script>
        function calcRocio() {
            const T = parseFloat(document.getElementById('temp').value);
            const RH = parseFloat(document.getElementById('hum').value);
            if(!isNaN(T) && !isNaN(RH)) {
                // Fórmula de Magnus-Tetens
                const a = 17.27; const b = 237.7;
                const alpha = ((a * T) / (b + T)) + Math.log(RH/100.0);
                const dp = (b * alpha) / (a - alpha);
                document.getElementById('res_rocio').style.display = 'block';
                document.getElementById('res_rocio').innerHTML = `<strong>Temperatura de condensación:</strong><br><span style="font-size:2rem; color:#d97706;">${dp.toFixed(1)} °C</span>`;
            }
        }
    </script>
</body>
</html>
