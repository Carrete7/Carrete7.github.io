<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potencia de Bombeo | IndustrialCalc Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --text: #1e293b;
            --primary: #2563eb; --border: #e2e8f0;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .card { background: var(--surface); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); max-width: 500px; margin: auto; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary); }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        .result { margin-top: 1.5rem; padding: 1rem; background: #eff6ff; border-radius: 6px; display: none; border: 1px solid #bfdbfe; }
    </style>
</head>
<body>
    <div class="card">
        <h1><i class="fas fa-pump-soap"></i> Potencia de Bombeo</h1>
        <div class="input-group">
            <label>Caudal (m³/s)</label>
            <input type="number" id="caudal" step="0.001" placeholder="Ej: 0.05">
        </div>
        <div class="input-group">
            <label>Altura Manométrica (m)</label>
            <input type="number" id="altura" placeholder="Ej: 30">
        </div>
        <div class="input-group">
            <label>Rendimiento (0.1 - 1.0)</label>
            <input type="number" id="rendimiento" step="0.1" value="0.75">
        </div>
        <button onclick="calcular()">Calcular Potencia (W)</button>
        <div id="resultado" class="result"></div>
        <br>
        <a href="index.html" style="text-decoration: none; color: #64748b; font-size: 0.9rem;">← Volver al inicio</a>
    </div>

    <script>
        function calcular() {
            const Q = document.getElementById('caudal').value;
            const H = document.getElementById('altura').value;
            const n = document.getElementById('rendimiento').value;
            const rho = 1000; // Densidad agua
            const g = 9.81;

            if(Q && H && n) {
                const P = (rho * g * Q * H) / n;
                const resDiv = document.getElementById('resultado');
                resDiv.style.display = 'block';
                resDiv.innerHTML = `<strong>Potencia necesaria:</strong> ${(P/1000).toFixed(2)} kW (${P.toFixed(0)} W)`;
            }
        }
    </script>
</body>
</html>
